name: Update ISD Metrics Weekly

on:
  schedule:
    # Run every Monday at 1:00 PM UTC (9:00 AM ET)
    - cron: '0 13 * * 1'
  workflow_dispatch:
    inputs:
      post_to_slack:
        description: 'Post the weekly summary to Slack after the report finishes'
        required: false
        default: false
        type: boolean
      workforce_onboarded:
        description: 'Optional connector-backed onboarded count override for the reporting week'
        required: false
        type: string
      workforce_offboarded:
        description: 'Optional connector-backed offboarded count override for the reporting week'
        required: false
        type: string
      workforce_source_note:
        description: 'Optional workforce source note shown in the report when overrides are used'
        required: false
        type: string

jobs:
  update-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Setup Google Calendar credentials
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > google-service-account.json
            echo "✓ Google Calendar credentials configured"
          else
            echo "⚠️  Google Calendar credentials not configured - OOO check will be skipped"
          fi

      - name: Run weekly metrics update (Dashboard)
        env:
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          WORKFORCE_OVERRIDE_ONBOARDED: ${{ inputs.workforce_onboarded }}
          WORKFORCE_OVERRIDE_OFFBOARDED: ${{ inputs.workforce_offboarded }}
          WORKFORCE_SOURCE_NOTE: ${{ inputs.workforce_source_note }}
        run: |
          echo "📊 Step 1/2: Updating ISD Weekly Metrics Dashboard..."
          node update-confluence-weekly.js

      - name: Update Weekly Analyst Report
        if: success()
        env:
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
        run: |
          echo "📝 Step 2/2: Updating Weekly Analyst Report..."
          node generate-weekly-analyst-report.js

      - name: Post to Slack
        if: success() && (github.event_name == 'schedule' || inputs.post_to_slack == true)
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          # Read week label and metrics from cache file
          WEEK_OF=$(node -e "console.log(require('./metrics-cache-weekly.json').currentWeek.period)")
          CREATED=$(node -e "console.log(require('./metrics-cache-weekly.json').currentWeek.createdCount)")
          RESOLVED=$(node -e "console.log(require('./metrics-cache-weekly.json').currentWeek.resolvedCount)")
          TTFR=$(node -e "console.log(require('./metrics-cache-weekly.json').currentWeek.avgTTFRFormatted)")
          TTR=$(node -e "console.log(require('./metrics-cache-weekly.json').currentWeek.avgTTRFormatted)")
          SLA=$(node -e "console.log(require('./metrics-cache-weekly.json').currentWeek.overallSlaPercent)")
          CSAT=$(node -e "console.log(require('./metrics-cache-weekly.json').currentWeek.csat.avgScore)")
          CSAT_COUNT=$(node -e "console.log(require('./metrics-cache-weekly.json').currentWeek.csat.totalResponses)")
          AUTO_PCT=$(node -e "console.log(require('./metrics-cache-weekly.json').currentWeek.automationPercent)")
          AUTO_COUNT=$(node -e "console.log(require('./metrics-cache-weekly.json').currentWeek.automatedCount)")
          WORKFORCE_TEXT=$(node -e "const wf=require('./metrics-cache-weekly.json').currentWeek.workforce || {}; const text = wf.connectorBacked === true ? ['• 🟢 Onboarded: ' + wf.totalOnboarding, '• 🔴 Offboarded: ' + wf.offboarding, '• ' + (wf.netChange > 0 ? '🟢 Net: +' : wf.netChange < 0 ? '🔴 Net: ' : '⚪️ Net: ') + wf.netChange].join('\\n') : '• ⚠️ Pending connector-backed verification'; console.log(JSON.stringify(text).slice(1,-1));")

          curl -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"itops-metric-reporting\",
              \"text\": \"✅ ISD Weekly Metrics Updated\",
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"✅ ISD Weekly Metrics Updated\",
                    \"emoji\": true
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"📅 *Week of $WEEK_OF*\\n\\nAll weekly Confluence pages have been automatically updated with the latest metrics.\"
                  }
                },
                {
                  \"type\": \"divider\"
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*📊 Key Metrics:*\\n• 📥 Created: $CREATED tickets\\n• ✅ Resolved: $RESOLVED tickets\\n• ⏱️ TTFR: $TTFR\\n• ⏲️ TTR: $TTR\\n• 🎯 SLA Met: $SLA%\\n• ⭐ CSAT: $CSAT/5.0 ($CSAT_COUNT reviews)\\n• 🤖 Automation: $AUTO_PCT% ($AUTO_COUNT tickets)\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*👥 Workforce Changes:*\\n$WORKFORCE_TEXT\"
                  }
                },
                {
                  \"type\": \"divider\"
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*📄 Updated Pages:*\\n• <https://attentivemobile.atlassian.net/wiki/spaces/ISD/pages/6423805982|📈 Weekly Metrics Dashboard>\\n• <https://attentivemobile.atlassian.net/wiki/spaces/ISD/pages/6424363046|📝 Weekly Analyst Report>\"
                  }
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"🤖 Automated via GitHub Actions • Next update: Next Monday at 9:00 AM ET\"
                    }
                  ]
                }
              ],
              \"unfurl_links\": false
            }"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Metrics update failed. Check the logs above for details."
