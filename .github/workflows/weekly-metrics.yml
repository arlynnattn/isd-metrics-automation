name: Update ISD Metrics Weekly

on:
  schedule:
    # Run every Monday at 1:00 PM UTC (9:00 AM ET)
    - cron: '0 13 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run weekly metrics update (Dashboard)
        env:
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          echo "📊 Step 1/2: Updating ISD Weekly Metrics Dashboard..."
          node update-confluence-weekly.js

      - name: Update Weekly Analyst Report
        if: success()
        env:
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
        run: |
          echo "📝 Step 2/2: Updating Weekly Analyst Report..."
          node generate-weekly-analyst-report.js

      - name: Post to Slack
        if: success()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          WEEK_OF=$(date -u +"%B %d, %Y")
          curl -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"itops-metric-reporting\",
              \"text\": \"✅ ISD Weekly Metrics Updated\",
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"✅ ISD Weekly Metrics Updated\",
                    \"emoji\": true
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"📅 *Week of $WEEK_OF*\\n\\nAll weekly Confluence pages have been automatically updated with the latest metrics.\"
                  }
                },
                {
                  \"type\": \"divider\"
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*📊 Updated Pages:*\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"• <https://attentivemobile.atlassian.net/wiki/spaces/ISD/pages/6423805982|📈 Weekly Metrics Dashboard>\\n• <https://attentivemobile.atlassian.net/wiki/spaces/ISD/pages/6424363046|📝 Weekly Analyst Report>\"
                  }
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"🤖 Automated via GitHub Actions • Next update: Next Monday at 9:00 AM ET\"
                    }
                  ]
                }
              ],
              \"unfurl_links\": false
            }"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Metrics update failed. Check the logs above for details."
