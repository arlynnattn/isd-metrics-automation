name: Update ISD Metrics Weekly

on:
  schedule:
    # Run every Monday at 9:00 AM UTC (adjust timezone as needed)
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run metrics update
        env:
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
        run: |
          node update-confluence-metrics.js

      - name: Post to Slack
        if: success()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          WEEK_OF=$(date -u +"%m/%d/%Y")
          curl -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"itops-metric-reporting\",
              \"text\": \"✅ *ISD Weekly Metrics Updated*\n📅 Week of $WEEK_OF\n\n📊 <https://attentivemobile.atlassian.net/wiki/spaces/ISD/pages/5471371324|View Confluence Dashboard>\",
              \"unfurl_links\": false
            }"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Metrics update failed. Check the logs above for details."
