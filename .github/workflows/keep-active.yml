name: Keep Repo Active

on:
  schedule:
    # Run daily at 2:00 AM UTC to keep repo active for scheduled workflows
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  keep-active:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update activity timestamp
        run: |
          echo "Last activity: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .last-activity
          echo "This file is automatically updated daily to keep the repository active."
          echo "This ensures GitHub Actions scheduled workflows run reliably."

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-activity

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update activity timestamp [skip ci]"
            git push
          fi
