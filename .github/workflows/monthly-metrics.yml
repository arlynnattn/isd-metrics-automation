name: Update ISD Metrics Monthly

on:
  schedule:
    # Run on 1st of every month at 1:00 PM UTC (9:00 AM ET)
    - cron: '0 13 1 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run monthly metrics update (Main Dashboard)
        env:
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          echo "📊 Step 1/3: Updating ISD Monthly Metrics Dashboard..."
          node update-confluence-monthly-enhanced.js

      - name: Update Monthly Analyst Report
        if: success()
        env:
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
        run: |
          echo "📝 Step 2/3: Updating Monthly Analyst Report..."
          node generate-monthly-analyst-report.js

      - name: Update Visual Slide Deck
        if: success()
        env:
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
        run: |
          echo "🎨 Step 3/3: Updating Visual Slide Deck..."
          node update-visual-slide-deck.js

      - name: Post to Slack
        if: success()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          MONTH=$(date -u +"%B %Y")

          # Read metrics from cache file
          CREATED=$(node -e "console.log(require('./metrics-cache-monthly.json').current.created)")
          RESOLVED=$(node -e "console.log(require('./metrics-cache-monthly.json').current.resolved)")
          TTFR=$(node -e "console.log(require('./metrics-cache-monthly.json').current.ttfr)")
          TTR=$(node -e "console.log(require('./metrics-cache-monthly.json').current.ttr)")
          SLA=$(node -e "console.log(require('./metrics-cache-monthly.json').current.slaMet)")
          CSAT=$(node -e "console.log(require('./metrics-cache-monthly.json').current.csat)")
          CSAT_COUNT=$(node -e "console.log(require('./metrics-cache-monthly.json').current.csatCount)")
          AUTO_PCT=$(node -e "console.log(require('./metrics-cache-monthly.json').current.automationPct)")
          AUTO_COUNT=$(node -e "console.log(require('./metrics-cache-monthly.json').current.automatedTickets)")
          FTE_ON=$(node -e "console.log(require('./metrics-cache-monthly.json').current.fteOnboarding)")
          CONT_ON=$(node -e "console.log(require('./metrics-cache-monthly.json').current.contractorOnboarding)")
          FTE_OFF=$(node -e "console.log(require('./metrics-cache-monthly.json').current.fteOffboarding)")
          CONT_OFF=$(node -e "console.log(require('./metrics-cache-monthly.json').current.contractorOffboarding)")

          curl -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"itops-metric-reporting\",
              \"text\": \"✅ ISD Monthly Metrics Updated\",
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"✅ ISD Monthly Metrics Updated\",
                    \"emoji\": true
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"📅 *$MONTH*\\n\\nAll monthly Confluence pages have been automatically updated with the latest metrics.\"
                  }
                },
                {
                  \"type\": \"divider\"
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*📊 Key Metrics:*\\n• 📥 Created: $CREATED tickets\\n• ✅ Resolved: $RESOLVED tickets\\n• ⏱️ TTFR: $TTFR\\n• ⏲️ TTR: $TTR\\n• 🎯 SLA Met: $SLA%\\n• ⭐ CSAT: $CSAT/5.0 ($CSAT_COUNT reviews)\\n• 🤖 Automation: $AUTO_PCT% ($AUTO_COUNT tickets)\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*👥 Workforce Changes:*\\n• 🟢 Onboarded: $((FTE_ON + CONT_ON)) ($FTE_ON FTE + $CONT_ON contractors)\\n• 🔴 Offboarded: $((FTE_OFF + CONT_OFF)) ($FTE_OFF FTE + $CONT_OFF contractors)\"
                  }
                },
                {
                  \"type\": \"divider\"
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*📄 Updated Pages:*\\n• <https://attentivemobile.atlassian.net/wiki/spaces/ISD/pages/6415089689|📈 Monthly Metrics Dashboard>\\n• <https://attentivemobile.atlassian.net/wiki/spaces/ISD/pages/6422003766|📝 Monthly Analyst Report>\\n• <https://attentivemobile.atlassian.net/wiki/spaces/ISD/pages/6440288277|🎨 Visual Slide Deck>\"
                  }
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"🤖 Automated via GitHub Actions • Next update: 1st of next month at 9:00 AM ET\"
                    }
                  ]
                }
              ],
              \"unfurl_links\": false
            }"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Monthly metrics update failed. Check the logs above for details."
