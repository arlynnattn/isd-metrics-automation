name: Update ISD Metrics Monthly

on:
  schedule:
    # Run on 1st of every month at 1:00 PM UTC (9:00 AM ET)
    - cron: '0 13 1 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run monthly metrics update
        env:
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          node update-confluence-monthly.js

      - name: Post to Slack
        if: success()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          MONTH=$(date -u +"%B %Y")
          curl -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"itops-metric-reporting\",
              \"text\": \"✅ *ISD Monthly Metrics Updated*\n📅 $MONTH\n\n📊 <https://attentivemobile.atlassian.net/wiki/spaces/ISD/pages/6415089689|View Confluence Dashboard>\",
              \"unfurl_links\": false
            }"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Monthly metrics update failed. Check the logs above for details."
