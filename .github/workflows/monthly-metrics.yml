name: Update ISD Metrics Monthly

on:
  schedule:
    # Run on 1st of every month at 1:00 PM UTC (9:00 AM ET)
    - cron: '0 13 1 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run monthly metrics update (Main Dashboard)
        env:
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          echo "📊 Step 1/3: Updating ISD Monthly Metrics Dashboard..."
          node update-confluence-monthly-enhanced.js

      - name: Update Monthly Analyst Report
        if: success()
        env:
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
        run: |
          echo "📝 Step 2/3: Updating Monthly Analyst Report..."
          node generate-monthly-analyst-report.js

      - name: Update Visual Slide Deck
        if: success()
        env:
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
        run: |
          echo "🎨 Step 3/3: Updating Visual Slide Deck..."
          node update-visual-slide-deck.js

      - name: Post to Slack
        if: success()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          MONTH=$(date -u +"%B %Y")
          curl -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"itops-metric-reporting\",
              \"text\": \"✅ ISD Monthly Metrics Updated\",
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"✅ ISD Monthly Metrics Updated\",
                    \"emoji\": true
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"📅 *$MONTH*\\n\\nAll monthly Confluence pages have been automatically updated with the latest metrics.\"
                  }
                },
                {
                  \"type\": \"divider\"
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*📊 Updated Pages:*\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"• <https://attentivemobile.atlassian.net/wiki/spaces/ISD/pages/6415089689|📈 Monthly Metrics Dashboard>\\n• <https://attentivemobile.atlassian.net/wiki/spaces/ISD/pages/6422003766|📝 Monthly Analyst Report>\\n• <https://attentivemobile.atlassian.net/wiki/spaces/ISD/pages/6440288277|🎨 Visual Slide Deck>\"
                  }
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"🤖 Automated via GitHub Actions • Next update: 1st of next month at 9:00 AM ET\"
                    }
                  ]
                }
              ],
              \"unfurl_links\": false
            }"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Monthly metrics update failed. Check the logs above for details."
